name: android-native-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: '17'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Build unsigned debug
        run: |
          gradle -p android --no-daemon clean :app:assembleDebug

      - name: Build unsigned release
        run: |
          gradle -p android --no-daemon :app:assembleRelease

      - name: Collect unsigned release APKs
        run: |
          mkdir -p android/artifacts/unsigned-release
          cp android/app/build/outputs/apk/release/*.apk android/artifacts/unsigned-release/

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/android/release.keystore

      - name: Build signed release
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          gradle -p android --no-daemon :app:clean :app:assembleRelease

      - name: Verify signed release APK signatures
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
        run: |
          "$ANDROID_HOME/build-tools"/*/apksigner verify --print-certs android/app/build/outputs/apk/release/*.apk

      - name: Collect signed release APKs
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
        run: |
          mkdir -p android/artifacts/signed-release
          cp android/app/build/outputs/apk/release/*.apk android/artifacts/signed-release/

      - name: Upload debug APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-apk-debug
          path: |
            android/app/build/outputs/apk/debug/*.apk

      - name: Upload unsigned release APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-apk-release-unsigned
          path: |
            android/artifacts/unsigned-release/*.apk

      - name: Upload signed release APK artifacts
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-apk-release-signed
          path: |
            android/artifacts/signed-release/*.apk
